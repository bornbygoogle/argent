<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css"></head>
<body><div class="stage"><div class="screen">

  <div class="topbar">
    <div class="tb-left"><button class="icon-btn"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button></div>
    <div class="tb-title">Comptes</div>
    <div class="tb-right"><button class="btn btn-secondary btn-sm">+ Ajouter</button></div>
  </div>

  <div class="content" style="padding-bottom:24px">
    <!-- net worth -->
    <div class="hero">
      <span class="label" style="color:rgba(255,255,255,.8)">Patrimoine total</span>
      <div class="amount" style="color:#fff;font-size:34px;margin-top:4px">3 842,50 €</div>
      <div class="caption" style="color:rgba(255,255,255,.85);margin-top:6px">3 comptes · devise €</div>
    </div>

    <div class="section-head"><span class="label">Mes comptes</span><span class="caption">Maintenir pour réordonner</span></div>

    <!-- account cards -->
    <div class="card" style="padding:14px 16px">
      <div style="display:flex;align-items:center;gap:12px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-300)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>
        <span class="acct-icon" style="background:rgba(79,70,229,.12);color:#4F46E5"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></span>
        <div class="r-main"><div class="r-title" style="font-size:15px">Compte courant</div><div class="r-sub">Courant · ⬤ récurrent actif</div></div>
      </div>
      <div class="row-between" style="margin-top:10px;padding-left:30px">
        <span class="amount-md" style="font-size:20px">2 190,30 €</span>
        <span class="stat-pill" style="background:var(--danger-50);color:var(--danger-600)">Budget à 92%</span>
      </div>
    </div>

    <div class="card" style="padding:14px 16px">
      <div style="display:flex;align-items:center;gap:12px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-300)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>
        <span class="acct-icon" style="background:rgba(16,185,129,.12);color:#10B981"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
        <div class="r-main"><div class="r-title" style="font-size:15px">Épargne</div><div class="r-sub">Épargne · Livret A</div></div>
      </div>
      <div class="row-between" style="margin-top:10px;padding-left:30px">
        <span class="amount-md" style="font-size:20px">1 540,00 €</span>
        <span class="stat-pill" style="background:var(--success-50);color:var(--success-600)">+200 € ce mois</span>
      </div>
    </div>

    <div class="card" style="padding:14px 16px">
      <div style="display:flex;align-items:center;gap:12px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-300)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>
        <span class="acct-icon" style="background:rgba(245,158,11,.12);color:#F59E0B"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg></span>
        <div class="r-main"><div class="r-title" style="font-size:15px">Espèces</div><div class="r-sub">Espèces · Portefeuille</div></div>
      </div>
      <div class="row-between" style="margin-top:10px;padding-left:30px">
        <span class="amount-md" style="font-size:20px">112,20 €</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-300)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>

    <!-- quick actions -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px">
      <button class="btn btn-secondary" style="height:48px"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>Virement</button>
      <button class="btn btn-secondary" style="height:48px"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Revenu</button>
    </div>
  </div>

</div></div></body></html>
