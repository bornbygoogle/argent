<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css"></head>
<body><div class="stage"><div class="screen" style="background:#fff">

  <div class="topbar">
    <div class="tb-left"><button class="icon-btn"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button></div>
    <div class="tb-title text-center" style="font-size:16px">Modifier la dépense</div>
    <div class="tb-right"><button class="icon-btn"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button></div>
  </div>

  <div class="content" style="padding:8px 16px 0;gap:10px">
    <div class="text-center" style="padding-top:6px">
      <span class="label">Montant</span>
      <div style="display:flex;align-items:baseline;justify-content:center;gap:4px;margin-top:4px">
        <span class="amount" style="color:var(--primary-600)">28,90</span><span class="h2 muted">€</span>
      </div>
      <div class="chip-row" style="justify-content:center;margin-top:10px"><button class="chip">+5</button><button class="chip">+10</button><button class="chip">+20</button><button class="chip">+50</button></div>
    </div>

    <div class="chip-row" style="padding-top:4px">
      <span class="chip active"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>Courses</span>
      <span class="chip">Restaurant</span><span class="chip">Transport</span><span class="chip">Loisirs</span><span class="chip">Gérer</span>
    </div>

    <div class="card tight" style="padding:4px 0">
      <div class="row" style="padding:10px 16px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
        <input class="input" style="flex:1;height:32px;background:transparent;border:none" value="Courses du soir — Carrefour" />
      </div>
      <div class="divider"></div>
      <div class="row" style="padding:10px 16px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
        <span style="flex:1;font-size:15px">Aujourd'hui, 24 juin · 18:42</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-300)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="divider"></div>
      <div class="row" style="padding:10px 16px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        <span style="flex:1;font-size:15px">Répéter</span><span class="toggle"></span>
      </div>
    </div>

    <span class="caption text-center" style="margin-top:2px">Modifié il y a 2 min</span>
  </div>

  <!-- bottom actions: save + delete -->
  <div style="padding:12px 16px 28px;margin-top:auto">
    <button class="btn btn-primary btn-block">Enregistrer les modifications</button>
    <button class="btn btn-ghost btn-block" style="height:44px;color:var(--danger-600);margin-top:8px">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      Supprimer cette dépense
    </button>
  </div>

</div></div></body></html>
