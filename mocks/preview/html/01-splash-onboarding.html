<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css"></head>
<body><div class="stage"><div class="screen" style="background:#fff">

  <!-- skip -->
  <div style="display:flex;justify-content:flex-end;padding:16px">
    <button class="btn btn-ghost btn-sm">Passer</button>
  </div>

  <!-- brand mark -->
  <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px">
    <div style="width:28px;height:28px;border-radius:8px;background:var(--primary-600);display:flex;align-items:center;justify-content:center;color:#fff">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    <span style="font-weight:700;font-size:16px">dépense</span>
  </div>

  <!-- illustration -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;text-align:center">
    <div style="position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center">
      <div style="position:absolute;width:200px;height:200px;border-radius:50%;background:var(--primary-50)"></div>
      <div style="position:absolute;width:140px;height:140px;border-radius:50%;background:var(--primary-100)"></div>
      <div style="position:relative;width:96px;height:96px;border-radius:28px;background:var(--primary-600);box-shadow:var(--shadow-fab);display:flex;align-items:center;justify-content:center;color:#fff">
        <svg viewBox="0 0 24 24" width="44" height="44" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      <!-- floating chips -->
      <div style="position:absolute;top:18px;left:6px;background:#fff;border-radius:14px;box-shadow:var(--shadow-md);padding:8px 12px;display:flex;align-items:center;gap:6px">
        <span class="cat sm" style="background:rgba(16,185,129,.15);color:#10B981"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg></span>
        <span style="font-size:12px;font-weight:600">−8,40 €</span>
      </div>
      <div style="position:absolute;bottom:24px;right:0;background:#fff;border-radius:14px;box-shadow:var(--shadow-md);padding:8px 12px;display:flex;align-items:center;gap:6px">
        <span class="cat sm" style="background:rgba(245,158,11,.15);color:#F59E0B"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11v9M21 11v9M5 11h14M7 11a5 5 0 0 1 10 0"/></svg></span>
        <span style="font-size:12px;font-weight:600">−14,00 €</span>
      </div>
    </div>

    <h1 class="h1" style="margin-top:32px">Ajoutez en 2 secondes</h1>
    <p class="body muted" style="margin-top:10px;max-width:280px">Saisissez une dépense en un geste, même hors-ligne. Le gros pavé numérique fait tout le travail.</p>

    <!-- dots -->
    <div style="display:flex;gap:8px;margin-top:36px">
      <span class="dot on" style="width:24px;border-radius:4px"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <!-- bottom actions -->
  <div style="padding:20px 16px 36px;display:flex;flex-direction:column;gap:10px">
    <button class="btn btn-primary btn-block">Continuer</button>
    <button class="btn btn-ghost btn-block" style="height:40px">J'ai déjà un compte</button>
  </div>

</div></div></body></html>
