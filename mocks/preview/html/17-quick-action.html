<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css"></head>
<body><div class="stage"><div class="screen">

  <!-- dimmed dashboard behind -->
  <div class="topbar"><div class="tb-left"><button class="acct-chip"><span class="acct-dot" style="background:#4F46E5"></span><span class="acct-name">Tous les comptes</span></button></div></div>
  <div class="content" style="filter:blur(2px);opacity:.45">
    <div class="hero"><span class="label" style="color:rgba(255,255,255,.8)">Solde total</span><div class="amount-lg" style="color:#fff;margin-top:6px">3 842,50 €</div></div>
    <div class="card"><div class="row-between"><span class="h3">À confirmer</span><span class="stat-pill" style="background:var(--warning-50);color:var(--warning-700)">2</span></div></div>
  </div>

  <div class="scrim"></div>

  <!-- quick action sheet -->
  <div class="sheet" style="padding:20px 16px 32px">
    <div class="handle"></div>
    <h2 class="h2" style="font-size:18px;margin-bottom:14px">Ajouter</h2>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      <button class="qa">
        <span class="qa-ic" style="background:var(--danger-600)"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
        <span class="qa-lbl">Dépense</span>
      </button>
      <button class="qa">
        <span class="qa-ic" style="background:var(--success-600)"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></span>
        <span class="qa-lbl">Revenu</span>
      </button>
      <button class="qa">
        <span class="qa-ic" style="background:var(--primary-600)"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg></span>
        <span class="qa-lbl">Virement</span>
      </button>
    </div>

    <button class="btn btn-ghost btn-block" style="margin-top:14px;height:44px">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7M21 3v6h-6"/></svg>
      Gérer les récurrents
    </button>
  </div>

</div></div></body></html>
