<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css"></head>
<body><div class="stage"><div class="screen" style="background:#fff">

  <div class="topbar">
    <div class="tb-left"><button class="btn btn-ghost btn-sm">Annuler</button></div>
    <div class="tb-title text-center" style="font-size:16px">Nouvelle dépense</div>
    <div class="tb-right"><button class="btn btn-primary btn-sm">OK</button></div>
  </div>

  <div class="content" style="padding:8px 16px 0;gap:8px">

    <!-- account picker -->
    <div class="card tight row-between" style="padding:8px 12px">
      <span class="body-sm" style="font-weight:600;color:var(--neutral-700)">Compte</span>
      <button class="acct-chip" style="height:32px;border-color:var(--neutral-200)">
        <span class="acct-dot" style="background:#4F46E5"></span>
        <span style="font-size:13px;font-weight:600">Courant</span>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--neutral-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>

    <!-- amount -->
    <div class="text-center" style="padding-top:2px">
      <span class="label">Montant</span>
      <div style="display:flex;align-items:baseline;justify-content:center;gap:4px;margin-top:4px">
        <span class="amount" style="color:var(--primary-600)">12,50</span><span class="h2 muted">€</span>
      </div>
      <div class="chip-row" style="justify-content:center;margin-top:8px">
        <button class="chip">+5</button><button class="chip">+10</button><button class="chip">+20</button><button class="chip">+50</button>
      </div>
    </div>

    <!-- category -->
    <div class="chip-row">
      <span class="chip active"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>Courses</span>
      <span class="chip"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11v9M21 11v9M5 11h14M7 11a5 5 0 0 1 10 0"/></svg>Restaurant</span>
      <span class="chip">Transport</span><span class="chip">Loisirs</span><span class="chip">Gérer</span>
    </div>

    <div class="card tight" style="padding:4px 0">
      <div class="row" style="padding:9px 16px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
        <input class="input" style="flex:1;height:32px;background:transparent;border:none" value="Courses du soir" />
      </div>
      <div class="divider"></div>
      <div class="row" style="padding:9px 16px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--neutral-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
        <span style="flex:1;font-size:15px">Aujourd'hui, 24 juin</span>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--neutral-300)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>
  </div>

  <!-- numpad -->
  <div style="padding:10px 16px 28px;margin-top:auto">
    <div class="numpad">
      <button class="key">1</button><button class="key">2</button><button class="key">3</button>
      <button class="key">4</button><button class="key">5</button><button class="key">6</button>
      <button class="key">7</button><button class="key">8</button><button class="key">9</button>
      <button class="key" style="background:transparent;color:var(--neutral-400)">.</button>
      <button class="key">0</button>
      <button class="key" style="background:transparent"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="var(--neutral-700)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 5H8l-7 7 7 7h13"/><path d="M18 9l-6 6M12 9l6 6"/></svg></button>
    </div>
  </div>

</div></div></body></html>
